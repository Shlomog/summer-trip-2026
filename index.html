<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Family Trip · Private</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
 integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
:root{
  --sand:#f7f1e7; --ink:#2a2118; --terra:#c0612f; --terra-d:#9c4a1f;
  --green:#3f5e4e; --gold:#caa24a; --sky:#2b6cb0; --card:#fffdf8;
  --shadow:0 10px 30px rgba(60,40,20,.12); --radius:16px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:"Heebo",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
  background:var(--sand);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit}
h1,h2,h3{margin:0 0 .3em;line-height:1.15;font-weight:900}
section{scroll-margin-top:64px}

/* ---------- GATE ---------- */
#gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  padding:24px;background:linear-gradient(160deg,#1c2b24,#2a2118 60%,#4a2c18)}
.gate-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  max-width:380px;width:100%;padding:34px 28px;text-align:center}
.gate-emoji{font-size:44px}
.gate-card h1{font-size:1.4rem;margin-top:10px}
.gate-card p{color:#6a5c4c;font-size:.92rem;margin:.2em 0 1.2em}
.gate-card input{width:100%;padding:13px 14px;font-size:1rem;font-family:inherit;
  border:2px solid #e4d8c4;border-radius:12px;text-align:center;background:#fffdf8}
.gate-card input:focus{outline:none;border-color:var(--terra)}
.gate-card button{margin-top:12px;width:100%;padding:13px;font-size:1rem;font-weight:700;font-family:inherit;
  color:#fff;background:var(--terra);border:none;border-radius:12px;cursor:pointer;transition:.15s}
.gate-card button:hover{background:var(--terra-d)}
.gate-err{color:#c0392b;font-size:.88rem;min-height:1.2em;margin-top:10px}
.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ---------- HERO ---------- */
#app[hidden]{display:none}
.hero{position:relative;min-height:78vh;display:flex;align-items:flex-end;color:#fff;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.03)}
.hero::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(20,15,10,.15) 0%,rgba(20,15,10,.25) 45%,rgba(20,15,10,.82) 100%)}
.hero-inner{position:relative;z-index:2;padding:40px 22px 34px;width:100%;max-width:1100px;margin:0 auto}
.hero .eyebrow{font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.8rem;opacity:.9}
.hero h1{font-size:clamp(2rem,7vw,3.6rem);text-shadow:0 2px 18px rgba(0,0,0,.4)}
.hero .sub{font-size:clamp(1rem,3.2vw,1.4rem);font-weight:300;opacity:.96}
.hero .meta{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  backdrop-filter:blur(4px);padding:6px 13px;border-radius:999px;font-size:.86rem;font-weight:500}

/* ---------- NAV ---------- */
.nav{position:sticky;top:0;z-index:50;background:rgba(247,241,231,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid #e7dcc8}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:6px;padding:8px 14px;overflow-x:auto}
.nav a{font-weight:600;font-size:.9rem;text-decoration:none;padding:7px 12px;border-radius:999px;white-space:nowrap;color:#5a4c3a}
.nav a:hover{background:#efe5d3}
.langbtn{margin-inline-start:auto;border:1.5px solid var(--terra);color:var(--terra);background:none;
  font-family:inherit;font-weight:700;padding:6px 14px;border-radius:999px;cursor:pointer;white-space:nowrap}
.langbtn:hover{background:var(--terra);color:#fff}

.wrap{max-width:1100px;margin:0 auto;padding:42px 18px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sec-head .ic{font-size:1.5rem}
.sec-head h2{font-size:clamp(1.4rem,4vw,2rem)}
.lead{color:#6a5c4c;margin:-8px 0 20px}

/* ---------- MAP ---------- */
#map{height:440px;border-radius:var(--radius);box-shadow:var(--shadow);z-index:1}
.maplegend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:.86rem;color:#5a4c3a}
.maplegend span{display:inline-flex;align-items:center;gap:7px}
.lg-line{width:26px;height:0;border-top:4px solid var(--terra)}
.lg-fly{width:26px;height:0;border-top:3px dashed var(--sky)}
.lg-dot{width:13px;height:13px;border-radius:50%;background:#c0392b;border:2px solid #fff;box-shadow:0 0 0 1px #c0392b}

/* ---------- DAYS ---------- */
.days{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.day{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.ph{position:relative;aspect-ratio:16/10;background:#e9ddc8}
.ph img{width:100%;height:100%;object-fit:cover}
.ph-fallback{background:linear-gradient(135deg,var(--green),var(--terra))}
.ph .daynum{position:absolute;top:10px;inset-inline-start:10px;z-index:2;background:rgba(42,33,24,.82);
  color:#fff;font-weight:700;font-size:.78rem;padding:5px 11px;border-radius:999px}
.day-body{padding:16px 18px 20px}
.day-date{color:var(--terra);font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.04em}
.day-body h3{font-size:1.18rem;margin:.15em 0 .4em}
.day-body p{margin:0 0 .8em;font-size:.95rem;color:#473b2c}
.day-hotel{font-size:.86rem;color:#5a4c3a;border-top:1px dashed #e1d4bd;padding-top:10px}

/* ---------- GALLERY ---------- */
.gal{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.gal figure{margin:0;position:relative;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);aspect-ratio:4/3;background:#e9ddc8}
.gal img{width:100%;height:100%;object-fit:cover;transition:.4s}
.gal figure:hover img{transform:scale(1.06)}
.gal figcaption{position:absolute;inset-inline:0;bottom:0;padding:18px 12px 9px;color:#fff;font-size:.82rem;font-weight:600;
  background:linear-gradient(transparent,rgba(0,0,0,.7))}

/* ---------- COSTS ---------- */
.costs{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.costs table{width:100%;border-collapse:collapse}
.costs td{padding:13px 18px;border-bottom:1px solid #efe4d0;font-size:.96rem}
.costs tr:last-child td{border-bottom:none}
.costs .amt{text-align:end;font-weight:700;white-space:nowrap}
.costs .bar{height:7px;background:linear-gradient(90deg,var(--terra),var(--gold));}
.costs .total td{background:#faf3e4;font-weight:900;font-size:1.05rem}
.costnote{color:#6a5c4c;font-size:.85rem;margin-top:12px}

/* ---------- INFO ---------- */
.info{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px 6px}
.info li{list-style:none;padding:13px 16px;border-bottom:1px solid #efe4d0;font-size:.97rem}
.info li:last-child{border-bottom:none}
.info ul{margin:0;padding:0}

footer{text-align:center;color:#8a7a64;font-size:.82rem;padding:30px 18px 44px}
@media(max-width:520px){ #map{height:360px} .wrap{padding:34px 14px} }
</style>
</head>
<body>

<div id="gate">
  <form class="gate-card" id="gateForm" autocomplete="off">
    <div class="gate-emoji">🔒✈️</div>
    <h1>טיול משפחתי · Family Trip</h1>
    <p>הזינו את הסיסמה כדי לצפות בתוכנית<br><span style="opacity:.7">Enter the password to view the trip</span></p>
    <input id="pw" type="password" inputmode="text" placeholder="סיסמה / Password" aria-label="Password" autofocus>
    <button type="submit">כניסה · Enter</button>
    <div class="gate-err" id="err"></div>
  </form>
</div>

<div id="app" hidden>
  <header class="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-inner">
      <div class="eyebrow" id="h-eyebrow"></div>
      <h1 id="h-title"></h1>
      <div class="sub" id="h-sub"></div>
      <div class="meta">
        <span class="chip" id="h-dates"></span>
        <span class="chip" id="h-travelers"></span>
      </div>
    </div>
  </header>

  <nav class="nav">
    <div class="nav-inner">
      <a href="#map-sec" id="n-map"></a>
      <a href="#days-sec" id="n-days"></a>
      <a href="#gal-sec" id="n-gal"></a>
      <a href="#cost-sec" id="n-cost"></a>
      <a href="#info-sec" id="n-info"></a>
      <button class="langbtn" id="langBtn" type="button"></button>
    </div>
  </nav>

  <section id="map-sec" class="wrap">
    <div class="sec-head"><span class="ic">🗺️</span><h2 id="t-map"></h2></div>
    <div id="map"></div>
    <div class="maplegend">
      <span><span class="lg-dot"></span><b id="lg-stop"></b></span>
      <span><span class="lg-line"></span><b id="lg-drive"></b></span>
      <span><span class="lg-fly"></span><b id="lg-flight"></b></span>
    </div>
  </section>

  <section id="days-sec" class="wrap" style="padding-top:8px">
    <div class="sec-head"><span class="ic">📅</span><h2 id="t-days"></h2></div>
    <div class="days" id="daysEl"></div>
  </section>

  <section id="gal-sec" class="wrap" style="padding-top:8px">
    <div class="sec-head"><span class="ic">📸</span><h2 id="t-gal"></h2></div>
    <div class="gal" id="galEl"></div>
  </section>

  <section id="cost-sec" class="wrap" style="padding-top:8px">
    <div class="sec-head"><span class="ic">💰</span><h2 id="t-cost"></h2></div>
    <div class="bar" style="height:7px;border-radius:6px;background:linear-gradient(90deg,var(--terra),var(--gold));margin-bottom:16px"></div>
    <div class="costs"><table id="costEl"></table></div>
    <div class="costnote" id="costNote"></div>
  </section>

  <section id="info-sec" class="wrap" style="padding-top:8px">
    <div class="sec-head"><span class="ic">🧳</span><h2 id="t-info"></h2></div>
    <div class="info"><ul id="infoEl"></ul></div>
  </section>

  <footer id="foot"></footer>
</div>

const ITER = 150000;
let C=null, lang="he", map=null, markers=[];

const $ = s => document.querySelector(s);
const t = o => (o && typeof o==="object" && !Array.isArray(o)) ? (o[lang] ?? o.en ?? "") : o;

async function decrypt(b64, password){
  const raw = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:ITER, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, data);
  return new TextDecoder().decode(plain);
}

$("#gateForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const pw = $("#pw").value.trim();
  const err = $("#err"); err.textContent="";
  try{
    const json = await decrypt(PAYLOAD, pw);
    C = JSON.parse(json);
    try{ sessionStorage.setItem("trip_pw", pw); }catch(_){}
    unlock();
  }catch(_){
    err.textContent = "סיסמה שגויה · Wrong password";
    $(".gate-card").classList.remove("shake"); void $(".gate-card").offsetWidth; $(".gate-card").classList.add("shake");
    $("#pw").select();
  }
});

function unlock(){
  $("#gate").style.display="none";
  $("#app").hidden=false;
  render();
  initMap();
}

function imgFail(img){ img.style.display="none"; img.parentNode.classList.add("ph-fallback"); }

function render(){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang==="he" ? "rtl" : "ltr";
  $("#langBtn").textContent = lang==="he" ? "English" : "עברית";

  $("#heroBg").style.backgroundImage = "url('"+C.meta.hero+"')";
  $("#h-eyebrow").textContent = t(C.meta.subtitle);
  $("#h-title").textContent   = t(C.meta.title);
  $("#h-sub").textContent     = t(C.meta.tagline);
  $("#h-dates").textContent   = "📅 "+t(C.meta.dates);
  $("#h-travelers").textContent = "👨‍👩‍👧‍👦 "+t(C.meta.travelers);

  $("#n-map").textContent=t(C.nav.map);   $("#t-map").textContent=t(C.nav.map);
  $("#n-days").textContent=t(C.nav.days); $("#t-days").textContent=t(C.nav.days);
  $("#n-gal").textContent=t(C.nav.gallery); $("#t-gal").textContent=t(C.nav.gallery);
  $("#n-cost").textContent=t(C.nav.costs); $("#t-cost").textContent=t(C.nav.costs);
  $("#n-info").textContent=t(C.nav.info); $("#t-info").textContent=t(C.nav.info);
  $("#lg-stop").textContent=t(C.map.stop); $("#lg-drive").textContent=t(C.map.drive); $("#lg-flight").textContent=t(C.map.flight);

  $("#daysEl").innerHTML = C.days.map((d,i)=>`
    <article class="day">
      <div class="ph"><span class="daynum">${t(d.tag)}</span>
        <img src="${d.img}" alt="" loading="lazy" onerror="imgFail(this)"></div>
      <div class="day-body">
        <div class="day-date">${t(d.date)}</div>
        <h3>${t(d.title)}</h3>
        <p>${t(d.body)}</p>
        <div class="day-hotel">🏨 ${t(d.hotel)}</div>
      </div>
    </article>`).join("");

  $("#galEl").innerHTML = C.gallery.map(g=>`
    <figure><img src="${g.img}" alt="" loading="lazy" onerror="imgFail(this)">
      <figcaption>${t(g.cap)}</figcaption></figure>`).join("");

  $("#costEl").innerHTML = C.costs.rows.map(r=>`
    <tr><td>${t(r.label)}</td><td class="amt">${r.value}</td></tr>`).join("")
    + `<tr class="total"><td>${t(C.costs.totalLabel)}</td><td class="amt">${C.costs.totalValue}</td></tr>`;
  $("#costNote").textContent = t(C.costs.note);

  $("#infoEl").innerHTML = C.info.map(i=>`<li>${t(i)}</li>`).join("");
  $("#foot").textContent = t(C.footer);

  if(map) markers.forEach(x=>x.m.setPopupContent(popupHtml(x.s)));
}

function popupHtml(s){ return `<b>${t(s.name)}</b><br><span style="color:#777">${t(s.note)}</span>`; }

function initMap(){
  map = L.map("map",{scrollWheelZoom:false}).setView([37.4,-120],6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:18, attribution:"© OpenStreetMap"}).addTo(map);
  L.polyline(C.driveRoute, {color:"#c0612f", weight:4, opacity:.9}).addTo(map);
  L.polyline(C.flightRoute, {color:"#2b6cb0", weight:3, dashArray:"8 9", opacity:.9}).addTo(map);
  C.stops.forEach(s=>{
    const m = L.circleMarker([s.lat,s.lng],
      {radius:8, color:"#fff", weight:2, fillColor:s.color||"#c0392b", fillOpacity:1}).addTo(map);
    m.bindPopup(popupHtml(s));
    markers.push({m,s});
  });
  const grp = L.featureGroup(markers.map(x=>x.m));
  map.fitBounds(grp.getBounds().pad(0.18));
  setTimeout(()=>map.invalidateSize(), 200);
}

$("#langBtn") && $("#langBtn").addEventListener("click", ()=>{ lang = lang==="he"?"en":"he"; render(); });

// auto-unlock within the same session
(function(){ try{ const s=sessionStorage.getItem("trip_pw"); if(s){ $("#pw").value=s;
  decrypt(PAYLOAD,s).then(j=>{C=JSON.parse(j);unlock();}).catch(()=>{}); } }catch(_){}})();
</script>
